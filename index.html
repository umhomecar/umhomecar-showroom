<style>
:root{
  --bg:#F7F4EF; --ink:#1C1A17; --muted:#8A8276; --line:#EDE7DD;
  --card:#FFFFFF; --brand:#E8472B; --brand-2:#F4A23B; --green:#06C755;
  --shadow:0 1px 3px rgba(28,26,23,.05),0 10px 28px rgba(28,26,23,.07); --shadow-lg:0 6px 14px rgba(28,26,23,.08),0 26px 56px rgba(28,26,23,.18);
  --radius:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
:focus-visible{outline:3px solid var(--brand);outline-offset:2px;border-radius:6px}
.hd{position:sticky;top:0;z-index:40;background:rgba(251,228,222,.92);backdrop-filter:blur(12px);border-bottom:1px solid #f3d3ca}
.hd-in{max-width:1180px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px}
.hd-logo{width:42px;height:42px;border-radius:11px;box-shadow:var(--shadow);background:#fff;padding:3px}
.hd-name{font-family:'Kanit',sans-serif;font-weight:700;font-size:1.18rem;letter-spacing:.2px;line-height:1.1}
.hd-name small{display:block;font-family:'Sarabun';font-weight:400;font-size:.72rem;color:var(--muted);letter-spacing:0}
.hd-actions{margin-left:auto;display:flex;gap:8px}
.hd-btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.92rem;padding:9px 16px;border-radius:999px;transition:transform .12s ease,box-shadow .12s ease}
.hd-btn:active{transform:scale(.96)}
.hd-line{background:var(--green);color:#fff}
.hd-call{background:var(--ink);color:#fff}
.hd-btn svg{width:17px;height:17px}
.hd-menu{font-size:1.45rem;line-height:1;padding:5px 11px;border-radius:11px;color:var(--ink);transition:background .14s}
.hd-menu:hover{background:rgba(0,0,0,.05)}
.active-filter{flex:1;min-width:0}
.af-chip{display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:#fff;font-family:'Kanit',sans-serif;font-weight:600;font-size:.86rem;padding:8px 15px;border-radius:999px;max-width:100%}
.af-chip span{opacity:.75;font-size:1rem}
.drawer-ov{position:fixed;inset:0;z-index:55;background:rgba(28,26,23,.5);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-ov.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;bottom:0;z-index:56;width:300px;max-width:84vw;background:var(--bg);box-shadow:var(--shadow-lg);transform:translateX(-100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.show{transform:translateX(0)}
.drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);font-family:'Kanit',sans-serif;font-weight:600;font-size:1.05rem}
.drawer-hd button{font-size:1.15rem;width:34px;height:34px;border-radius:50%;display:grid;place-items:center}
.drawer-hd button:hover{background:rgba(0,0,0,.05)}
.drawer-body{flex:1;overflow-y:auto;padding:6px 0 30px}
.dr-all,.dr-brand,.dr-model{width:100%;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:8px;font-family:'Sarabun',sans-serif;font-size:.98rem;color:var(--ink);padding:12px 18px;transition:background .12s}
.dr-all{font-family:'Kanit',sans-serif;font-weight:600;border-bottom:1px solid var(--line)}
.dr-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.dr-cat{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 6px;font-family:'Kanit',sans-serif;font-weight:600;font-size:.84rem;color:var(--ink);cursor:pointer;text-align:center}
.dr-cat:active{background:#efeae2}
.dr-tiktok{display:flex;align-items:center;justify-content:center;gap:6px;background:#000;color:#fff;border-radius:11px;padding:11px;font-family:'Kanit',sans-serif;font-weight:600;font-size:.88rem;text-decoration:none;margin-bottom:15px}
.dr-section{font-family:'Kanit',sans-serif;font-weight:700;font-size:.78rem;color:#8A8276;letter-spacing:.02em;margin:4px 0 9px;padding-left:2px}
.dr-brand{font-weight:600}
.dr-all:hover,.dr-brand:hover,.dr-model:hover{background:rgba(0,0,0,.04)}
.dr-all.on,.dr-brand.on{color:var(--brand)}
.dr-meta{color:var(--muted);font-size:.85rem;font-weight:400;display:flex;align-items:center;gap:6px}
.dr-meta .chev{font-style:normal;display:inline-block;transition:transform .2s}
.dr-group.open .dr-meta .chev{transform:rotate(90deg)}
.dr-models{display:none;background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.dr-group.open .dr-models{display:block}
.dr-model{padding-left:36px;font-size:.92rem}
.dr-pop{padding-left:18px;font-weight:600;border-bottom:1px solid var(--line)}
.dr-model>span{color:var(--muted);font-size:.82rem}
.dr-model.on{color:var(--brand);font-weight:600;background:#fff7f4}
@media(max-width:680px){.hd-actions{display:none}}
.hero{max-width:1180px;margin:0 auto;padding:18px 18px 8px}
.hero-cover{width:100%;aspect-ratio:16/6;background-size:cover;background-position:center;border-radius:16px;box-shadow:var(--shadow);margin-bottom:16px}
@media(max-width:680px){.hero-cover{aspect-ratio:5/3}}
.hero-stats{color:var(--muted);margin-top:8px;font-size:.95rem;line-height:1.5}
.hero-cta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:16px}
.hero-btn{background:linear-gradient(100deg,var(--brand),var(--brand-2));color:#fff;border:none;font-family:'Kanit',sans-serif;font-weight:700;font-size:1rem;padding:12px 26px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow)}
.hero-btn:active{transform:scale(.97)}
.hero-trust{color:var(--muted);font-size:.9rem;display:inline-flex;align-items:center;gap:5px}
.hero h1{font-family:'Kanit',sans-serif;font-weight:700;font-size:clamp(1.7rem,5vw,2.6rem);line-height:1.12;letter-spacing:.3px}
.hero h1 .accent{background:linear-gradient(100deg,var(--brand),var(--brand-2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);margin-top:8px;font-size:1.02rem}
.hero .cnt{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:#fff;border:1px solid var(--line);padding:7px 15px;border-radius:999px;font-weight:600;font-size:.9rem;box-shadow:var(--shadow)}
.hero .cnt b{color:var(--brand);font-family:'Kanit';font-size:1.05rem}
.tools{max-width:1180px;margin:18px auto 0;padding:0 18px;position:sticky;top:67px;z-index:30}
.tools-card{background:rgba(247,244,239,.92);backdrop-filter:blur(8px);padding:6px 0 10px}
.search{position:relative}
.search input{width:100%;padding:15px 16px 15px 46px;border:1.5px solid var(--line);border-radius:16px;background:#fff;font-size:1rem;font-family:inherit;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s}
.search input:focus{border-color:var(--brand);outline:none;box-shadow:0 0 0 4px rgba(232,71,43,.1)}
.search .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;opacity:.5}
.row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;flex:1;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:8px 15px;border-radius:999px;background:#fff;border:1.5px solid var(--line);font-weight:600;font-size:.88rem;color:var(--ink);transition:all .14s}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.sort{padding:9px 14px;border:1.5px solid var(--line);border-radius:999px;background:#fff;font-family:inherit;font-weight:600;font-size:.86rem;color:var(--ink);cursor:pointer;transition:border-color .14s}
.chip:hover,.sort:hover{border-color:var(--brand)}
.pager button:not(:disabled):not(.on):hover{border-color:var(--brand);color:var(--brand)}
.chips-sub{margin-top:9px}
.chips-sub .chip{font-size:.84rem;padding:7px 13px}
.chips-sub .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.pager{max-width:1180px;margin:0 auto 90px;padding:4px 18px 0;display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}
.pager button{min-width:40px;height:40px;padding:0 13px;border:1.5px solid var(--line);background:#fff;border-radius:12px;font-family:'Kanit',sans-serif;font-weight:600;font-size:.94rem;color:var(--ink);transition:all .14s}
.pager button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pager button:disabled{opacity:.38;cursor:default}
.grid{max-width:1180px;margin:14px auto 90px;padding:0 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px}
.sec-head{max-width:1180px;margin:26px auto 0;padding:0 18px;font-family:'Kanit',sans-serif;font-weight:700;font-size:1.35rem;color:var(--ink);display:flex;align-items:center;gap:11px}
.sec-head::before{content:"";width:5px;height:1.1em;border-radius:99px;background:linear-gradient(var(--brand),var(--brand-2));flex:none}
.sec-head-all{margin-top:30px}
.featured{margin-bottom:6px}
.featured .grid{margin:12px auto 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .16s ease,box-shadow .16s ease;display:flex;flex-direction:column;text-align:left;width:100%}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.card-img{position:relative;aspect-ratio:4/3;background:#efe9e0;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.card:hover .card-img img{transform:scale(1.05)}
.card-img .noimg{width:100%;height:100%;display:grid;place-items:center;font-size:2.4rem;opacity:.4}
.card-img .pics{position:absolute;right:9px;bottom:9px;background:rgba(28,26,23,.72);color:#fff;font-size:.74rem;font-weight:600;padding:3px 9px;border-radius:999px;backdrop-filter:blur(4px)}
.badges{position:absolute;left:9px;top:9px;display:flex;flex-direction:column;gap:5px;align-items:flex-start;z-index:1}
.badges .hot{background:var(--brand);color:#fff;font-family:'Kanit',sans-serif;font-weight:700;font-size:.74rem;padding:4px 11px;border-radius:999px;box-shadow:var(--shadow)}
.badges .sale{background:#fff;color:var(--brand);border:1.5px solid var(--brand);font-family:'Kanit',sans-serif;font-weight:600;font-size:.72rem;padding:3px 10px;border-radius:999px}
.price .old{font-family:'Sarabun',sans-serif;font-size:.85rem;color:var(--muted);text-decoration:line-through;font-weight:400;margin-left:7px;display:inline}
.sh-price .old{font-family:'Sarabun',sans-serif;font-size:1.1rem;color:var(--muted);text-decoration:line-through;font-weight:400;margin-left:9px}
.sh-hot{display:inline-block;background:var(--brand);color:#fff;font-family:'Kanit',sans-serif;font-weight:700;font-size:.82rem;padding:4px 12px;border-radius:999px;margin-bottom:8px}
.card-bd{padding:13px 15px 15px;display:flex;flex-direction:column;gap:7px;flex:1}
.card-nm{font-family:'Kanit',sans-serif;font-weight:600;font-size:1.02rem;line-height:1.25}
.card-meta{color:var(--muted);font-size:.84rem;display:flex;gap:8px;flex-wrap:wrap}
.card-meta span{display:inline-flex;align-items:center;gap:4px}
.card-ft{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px;padding-top:6px}
.price{font-family:'Kanit',sans-serif;font-weight:700;font-size:1.32rem;color:var(--brand);line-height:1}
.price small{font-family:'Sarabun';font-weight:400;font-size:.7rem;color:var(--muted);display:block}
.card-go{font-size:.82rem;font-weight:600;color:var(--ink);background:var(--bg);padding:8px 13px;border-radius:10px;white-space:nowrap}
.card-pricerow{margin-top:auto;padding-top:6px}
.card-inst{font-size:.8rem;color:var(--muted);font-family:'Sarabun',sans-serif;margin-top:3px}
.card-inst b{color:var(--ink);font-weight:700}
.card-btn{display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Kanit',sans-serif;font-weight:600;font-size:.86rem;padding:9px;border-radius:10px;cursor:pointer;text-decoration:none;border:none;transition:filter .14s,transform .1s,background .14s,border-color .14s,color .14s}
.card-btn:active{transform:scale(.97)}
.card-line:hover,.card-call:hover{filter:brightness(1.07)}
.card-detail:hover{background:#fff;border-color:var(--brand);color:var(--brand)}
.card-cmp:hover{border-color:var(--brand)}
.card-detail{width:100%;margin-top:2px;background:var(--bg);color:var(--ink);border:1.5px solid var(--line)}
.card-contact{display:flex;gap:8px}
.card-contact .card-btn{flex:1}
.card-line{background:var(--green);color:#fff}
.card-call{background:var(--ink);color:#fff}
.card-cmp{width:100%;margin-top:10px;background:var(--bg);border:1.5px solid var(--line);color:var(--ink);font-family:'Kanit',sans-serif;font-weight:600;font-size:.84rem;padding:9px;border-radius:11px;cursor:pointer}
.card-cmp.on{background:#fde9e4;border-color:var(--brand);color:var(--brand)}
.state{max-width:1180px;margin:60px auto;padding:0 18px;text-align:center;color:var(--muted)}
.state .em{font-size:3rem;margin-bottom:10px}
.state h3{font-family:'Kanit';color:var(--ink);margin-bottom:6px}
.skel{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.skel .b{background:linear-gradient(90deg,#efe9e0 25%,#f6f1ea 50%,#efe9e0 75%);background-size:200% 100%;animation:sh 1.3s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.ov{position:fixed;inset:0;z-index:60;background:rgba(28,26,23,.6);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.sheet{background:var(--bg);width:100%;max-width:760px;max-height:94vh;border-radius:24px 24px 0 0;overflow-y:auto;box-shadow:var(--shadow-lg);animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
@media(min-width:760px){.ov{align-items:center}.sheet{border-radius:24px}}
.sh-hero{position:relative;aspect-ratio:16/10;background:#000;overflow:hidden}
.sh-hero img{width:100%;height:100%;object-fit:cover}
.sh-x{position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.92);font-size:1.2rem;display:grid;place-items:center;box-shadow:var(--shadow);z-index:2}
.sh-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.85);font-size:1.3rem;display:grid;place-items:center;box-shadow:var(--shadow);z-index:2}
.sh-nav.prev{left:10px}.sh-nav.next{right:10px}
.sh-count{position:absolute;bottom:12px;right:12px;background:rgba(28,26,23,.7);color:#fff;font-size:.78rem;padding:4px 11px;border-radius:999px}
.sh-thumbs{display:flex;gap:7px;overflow-x:auto;padding:11px 16px;scrollbar-width:none}
.sh-thumbs::-webkit-scrollbar{display:none}
.sh-thumbs img{width:62px;height:48px;object-fit:cover;border-radius:9px;cursor:pointer;flex-shrink:0;border:2.5px solid transparent;opacity:.65;transition:all .15s}
.sh-thumbs img.on{border-color:var(--brand);opacity:1}
.sh-bd{padding:4px 20px 20px}
.sh-nm{font-family:'Kanit',sans-serif;font-weight:700;font-size:1.45rem;line-height:1.2}
.sh-price{font-family:'Kanit',sans-serif;font-weight:700;font-size:2rem;color:var(--brand);margin:6px 0 16px}
.specs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:520px){.specs{grid-template-columns:repeat(3,1fr)}}
.spec{background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 13px}
.spec span{display:block;color:var(--muted);font-size:.74rem;margin-bottom:2px}
.spec b{font-weight:600;font-size:.98rem}
.inst{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:16px}
.inst-h{font-family:'Kanit';font-weight:600;font-size:.95rem;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.inst-row{display:flex;gap:8px;flex-wrap:wrap}
.inst-row .it{background:var(--bg);border-radius:10px;padding:8px 12px;font-size:.86rem;font-weight:600}
.inst-row .it b{color:var(--brand);font-family:'Kanit'}
.desc{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-size:.92rem;color:#4a463f;margin-bottom:16px}

.fin-hd{font-family:'Kanit',sans-serif;font-weight:700;font-size:1.02rem}
.fin-hd small{display:block;font-weight:400;color:#8A8276;font-size:.75rem;margin-top:3px}
.fin-label{display:block;font-size:.82rem;color:#6b6459;font-weight:600;margin:11px 0 5px}
.fin-input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:1.05rem;font-family:'Sarabun',sans-serif;background:var(--bg);box-sizing:border-box}
.fin-pcts{display:flex;gap:7px;margin-top:8px}
.fin-pct{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:9px 4px;font-family:'Kanit',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;color:var(--ink)}

.fin-terms{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}

.fin-term span{font-size:.73rem;color:#8A8276}
.fin-term.on{border-color:var(--brand);background:#fde9e4}
.fin-term.on span{color:var(--brand)}
.fin-result{margin-top:14px;background:var(--brand);color:#fff;border-radius:13px;padding:14px;text-align:center}
.fin-result>span{font-size:.82rem;opacity:.92;display:block}
.fin-result b{font-family:'Kanit',sans-serif;font-size:1.8rem;font-weight:800;display:block;line-height:1.25}
.fin-result small{font-size:.75rem;opacity:.92}
.fin-note{font-size:.72rem;color:#8A8276;margin-top:9px;line-height:1.45}
.sim{margin-bottom:16px}
.sim-hd{font-family:'Kanit',sans-serif;font-weight:700;font-size:1.02rem;margin-bottom:10px}

/* ═══════════════════════════════════════════════════════════════════════════
   UMHOME SHOWROOM — PREMIUM AUTOMOTIVE UI V2
   เปลี่ยนเฉพาะหน้าตา/ประสบการณ์ใช้งาน โดยคงระบบข้อมูลเดิมทั้งหมด

:root{
  --bg:#F3F0EA;
  --ink:#171715;

  --radius:16px;
}
body{
  background:
    radial-gradient(circle at 8% 0%,rgba(196,160,96,.09),transparent 28rem),
    linear-gradient(180deg,#F7F5F1 0,#F3F0EA 25rem);
  letter-spacing:.005em;
}
body::selection{background:rgba(165,42,32,.18)}

.hero-cta{gap:10px;margin-top:24px}
.hero-action{min-height:46px;padding:11px 18px;border-radius:11px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.2);box-shadow:none;backdrop-filter:blur(8px)}

.hero-action.primary{background:var(--brand);border:1px solid var(--brand);box-shadow:0 10px 24px rgba(165,42,32,.28)}
.hero-action .count{background:rgba(255,255,255,.16)}
.trust-strip{max-width:1180px;margin:-1px auto 6px;padding:17px 24px;background:#fff;border:1px solid var(--line);border-top:0;border-radius:0 0 18px 18px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;box-shadow:var(--shadow);position:relative;z-index:3}
.trust-item{display:flex;align-items:center;gap:10px;min-width:0;color:#37342F;font-size:.88rem;font-weight:600}
.trust-icon{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:#F4EFE6;color:var(--brand);font-family:'Kanit';font-size:.85rem;flex:none}

/* Search and filters */
.tools{max-width:1180px;margin:24px auto 0;top:78px;padding:0 18px}
.tools-card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 12px 42px rgba(23,23,21,.08);backdrop-filter:blur(14px)}
.search input{min-height:52px;border:1px solid #D8D1C6;border-radius:13px;background:#F9F8F5;box-shadow:none;padding-left:48px;font-size:1rem}
.search input:focus{background:#fff;border-color:var(--brand);box-shadow:0 0 0 4px rgba(165,42,32,.09)}
.search .ic{opacity:.55}
.row{margin-top:10px;gap:9px}
.sort,.adv-toggle{min-height:40px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:8px 13px;font-family:'Sarabun',sans-serif;font-weight:600}
.sort:hover,.adv-toggle:hover{border-color:#B9AFA2}
.adv-toggle.on{border-color:var(--brand);background:#FAF0EE;color:var(--brand)}
.advanced{border-radius:14px;box-shadow:none;border-color:var(--line);background:#FBFAF8}
.adv-field select,.adv-field input,.form-field input,.form-field select,.form-field textarea{border-radius:10px;background:#fff}
.af-chip{border-radius:9px;background:#24231F;padding:8px 12px}
.result-count{color:#4D4942}

/* Sections and grid */
.sec-head{max-width:1180px;margin-top:34px;padding:0 18px;font-size:1.45rem;letter-spacing:-.01em}
.sec-head::before{width:4px;background:var(--brand)}
.grid{max-width:1180px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-top:15px}
.featured .grid{margin-top:14px}

/* Premium vehicle card */
.card{border:1px solid rgba(23,23,21,.09);border-radius:17px;box-shadow:0 5px 22px rgba(23,23,21,.055);transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;background:#fff}
.card:hover{transform:translateY(-5px);box-shadow:0 18px 42px rgba(23,23,21,.12);border-color:rgba(165,42,32,.22)}
.card-img{aspect-ratio:16/10;background:#EAE6DF}
.card-img img{transition:transform .55s cubic-bezier(.2,.8,.2,1)}
.card:hover .card-img img{transform:scale(1.035)}
.badges{left:12px;top:12px;flex-direction:row;gap:6px}
.badges .hot,.badges .sale{font-size:.7rem;padding:5px 9px;border-radius:7px;box-shadow:none}
.badges .hot{background:rgba(23,23,21,.88);backdrop-filter:blur(6px)}
.badges .sale{background:#fff;color:var(--brand);border:0}
.fav-btn{right:12px;top:12px;width:38px;height:38px;background:rgba(255,255,255,.92);border:1px solid rgba(23,23,21,.08);box-shadow:0 6px 18px rgba(23,23,21,.09);font-size:1rem}
.fav-btn.on{color:var(--brand);background:#fff}
.pics{right:12px!important;bottom:11px!important;background:rgba(23,23,21,.68)!important}
.tik-pip{top:auto;right:auto;left:12px;bottom:11px;width:28px;height:28px;font-size:.76rem}
.card-bd{padding:16px 16px 15px;gap:7px}
.card-nm{font-size:1.05rem;min-height:2.55em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.28}
.card-meta{font-size:.82rem;color:#777168;border-bottom:1px solid #EEEAE4;padding-bottom:10px}
.card-pricerow{padding-top:4px}
.price{font-size:1.45rem;color:var(--brand);letter-spacing:-.01em}
.price small{margin-top:3px}
.price .old{font-size:.78rem}
.card-inst{font-size:.81rem;margin-top:5px;color:#706A61}
.card-inst b{color:#25231F}
.card-detail{min-height:42px;margin-top:6px;background:#1D1C19;color:#fff;border:1px solid #1D1C19;border-radius:10px}
.card-detail:hover{background:#302E29!important;border-color:#302E29!important;color:#fff!important}
.card-contact{display:none!important}
.card-cmp{width:auto;align-self:flex-start;margin-top:1px;padding:6px 0;border:0;background:transparent;color:#756F66;font-family:'Sarabun',sans-serif;font-size:.78rem;text-align:left}
.card-cmp:hover,.card-cmp.on{background:transparent;border:0;color:var(--brand)}
.owner-card-stats{border-radius:8px;background:#F7F3EC;border-color:#E5D8C5;color:#6A5640}

/* Drawer */
.drawer{background:#F7F5F1;width:330px}
.drawer-hd{background:#fff;padding:19px 20px}
.drawer-body{padding:14px}
.dr-cats{gap:9px}
.dr-cat,.dr-tiktok{border-radius:10px}
.dr-section{margin-top:18px}
.dr-all,.dr-brand,.dr-model{border-radius:9px;padding-left:12px;padding-right:12px}
.dr-models{border:0;background:transparent;padding-left:8px}
.dr-model.on{background:#F6EDEA}
.drawer-foot{border-top-color:var(--line)}

/* Detail modal */
.ov{background:rgba(14,14,13,.72);backdrop-filter:blur(8px)}
.sheet{background:#F7F5F1;box-shadow:0 40px 120px rgba(0,0,0,.34)}
.sh-hero{background:#151515}
.sh-hero img{object-fit:contain;background:#151515}
.sh-x,.sh-share,.sh-nav{background:rgba(255,255,255,.94);box-shadow:0 6px 20px rgba(0,0,0,.14)}
.sh-thumbs{background:#151515;padding:10px 14px}
.sh-thumbs img{border-radius:7px;opacity:.55}
.sh-thumbs img.on{border-color:#D6B674;opacity:1}
.sh-bd{padding:25px 26px 28px}
.sh-hot{border-radius:7px;background:#22211E;font-size:.74rem}
.sh-nm{font-size:1.65rem;letter-spacing:-.012em}
.sh-price{font-size:2.15rem;color:var(--brand);border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px}
.specs{gap:8px}
.spec{border-radius:11px;background:#fff;border-color:var(--line);padding:11px 12px}
.desc{border-radius:11px;background:#fff;line-height:1.7}
.detail-action-row{grid-template-columns:1fr 1fr;gap:8px}
.detail-action{border-radius:10px;background:#fff}
.premium-cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}
.appointment-cta,.lead-cta{margin:0!important;min-height:48px;border-radius:11px;font-family:'Kanit',sans-serif;font-weight:700}
.appointment-cta{background:#1D1C19;color:#fff;border:1px solid #1D1C19}
.lead-cta{background:var(--brand);box-shadow:none}
.cmp-add{border-radius:10px}
.cta-row{position:sticky;bottom:-1px;z-index:3;background:linear-gradient(180deg,rgba(247,245,241,0),#F7F5F1 18%);padding-top:22px}
.cta{border-radius:11px}

/* Finance collapsible */
.finance-accordion{margin:0 0 16px;border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden}
.finance-accordion>summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 16px;cursor:pointer;font-family:'Kanit',sans-serif;font-weight:700;color:var(--ink)}
.finance-accordion>summary::-webkit-details-marker{display:none}
.finance-accordion>summary::after{content:"＋";width:28px;height:28px;border-radius:50%;background:#F2EEE7;display:grid;place-items:center;font-size:1rem;color:var(--brand);flex:none}
.finance-accordion[open]>summary::after{content:"−"}
.finance-accordion .finance{border:0;border-top:1px solid var(--line);border-radius:0;margin:0;padding:16px}
.finance-accordion .fin-hd{display:none}
.fin-input{border-radius:10px;background:#F8F6F2}
.fin-pct,.fin-term{border-radius:9px}
.fin-term.on{background:#F5E9E6;border-color:var(--brand)}
.fin-result{background:#1D1C19;border-radius:11px}
.fin-send{border-radius:10px}

/* Similar, compare, forms */
.sim-card,.rec-card,.cmp-col{border-radius:12px;box-shadow:none}
.form-sheet{max-width:720px}
.form-head{background:rgba(255,255,255,.96)}
.form-submit{background:var(--brand);border-radius:10px}
.form-choice .choice-btn{border-radius:10px}
.cmp-bar{background:#1D1C19;border:1px solid rgba(255,255,255,.08)}
.cmp-sheet{max-width:980px}
.stats-sheet{background:#F7F5F1}

/* Share menu */
.share-menu-ov{position:fixed;inset:0;z-index:100;background:rgba(14,14,13,.62);backdrop-filter:blur(7px);display:grid;place-items:center;padding:18px}
.share-panel{width:min(430px,100%);background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:20px;border:1px solid rgba(23,23,21,.08)}
.share-panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.share-panel h3{font-family:'Kanit',sans-serif;font-size:1.2rem;margin:0}
.share-panel p{color:var(--muted);font-size:.85rem;margin-bottom:15px}
.share-close{width:36px;height:36px;border-radius:50%;background:#F3F0EA;font-size:1.05rem}
.share-options{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.share-option{display:flex;align-items:center;justify-content:center;gap:8px;min-height:46px;border-radius:10px;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:'Kanit',sans-serif;font-weight:600}
.share-option.line{background:var(--green);color:#fff;border-color:var(--green)}
.share-option.fb{background:#1877F2;color:#fff;border-color:#1877F2}
.share-option.copy{grid-column:1/-1;background:#1D1C19;color:#fff;border-color:#1D1C19}

/* Footer */
.foot{padding:34px 18px 110px;color:#817B72}

@media(min-width:900px){
  .ov{align-items:center;padding:24px}
  #ov .sheet{width:min(1180px,calc(100vw - 48px));height:min(88vh,860px);max-width:none;max-height:none;border-radius:22px;display:grid;grid-template-columns:minmax(0,1.22fr) minmax(390px,.78fr);grid-template-rows:minmax(0,1fr) auto;overflow:hidden}
  #ov .sh-hero{grid-column:1;grid-row:1;aspect-ratio:auto;height:100%;min-height:0}
  #ov .sh-thumbs{grid-column:1;grid-row:2;min-width:0}
  #ov .sh-bd{grid-column:2;grid-row:1 / span 2;overflow-y:auto;min-height:0;background:#F7F5F1}
}

@media(max-width:899px){
  .hero{margin-left:14px;margin-right:14px;padding:42px 30px;min-height:310px}

}

  .hero-cta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .hero-action{min-width:0!important;padding:10px 9px;font-size:.82rem}
  .hero-action.primary{grid-column:1/-1}
  .trust-strip{margin:0 20px 4px;padding:13px 14px;grid-template-columns:1fr 1fr;gap:9px;border-radius:0 0 14px 14px}
  .trust-item{font-size:.74rem;gap:7px}
  .trust-icon{width:25px;height:25px;border-radius:7px;font-size:.7rem}
  .tools{top:63px;margin-top:18px;padding:0 12px}

  .row{display:grid;grid-template-columns:1fr 1fr}

  .sec-head{padding:0 13px;font-size:1.2rem;margin-top:28px}
  .card{border-radius:13px}
  .card-img{aspect-ratio:4/3}

  .card-nm{font-size:.87rem;min-height:2.45em}

  .price{font-size:1.08rem}
  .price .old{display:block;margin:3px 0 0;font-size:.68rem}
  .card-inst{font-size:.68rem;line-height:1.35}

/* ═══════════════════════════════════════════════════════════════════════════
   SHOWROOM UI V3 — SOFT LIGHT PREMIUM
   ปรับโทนให้สว่างขึ้น สดขึ้น และแก้ปุ่มรถโปรดด้านบน
   ═══════════════════════════════════════════════════════════════════════════ */
:root{
  --bg:#F4F8FC;
  --ink:#1F2937;
  --muted:#64748B;
  --line:#DCE7F3;
  --card:#FFFFFF;
  --brand:#2F80ED;
  --brand-2:#22C7D6;
  --green:#22C55E;
  --price:#EF5B3F;
  --shadow:0 8px 22px rgba(15,23,42,.06);
  --shadow-lg:0 18px 50px rgba(15,23,42,.16);
  --radius:16px;
}
body{
  background:
    radial-gradient(circle at 100% 0%, rgba(34,199,214,.10), transparent 20rem),
    radial-gradient(circle at 0% 6%, rgba(47,128,237,.10), transparent 18rem),
    linear-gradient(180deg,#F8FBFF 0,#F4F8FC 13rem,#EEF5FC 100%);
  color:var(--ink);
}
.hd{
  background:rgba(255,255,255,.92);
  border-bottom:1px solid #E7EEF8;
  backdrop-filter:blur(14px);
}
.hd-in{padding:11px 18px}
.hd-logo{background:#fff;border:1px solid #E7EEF8;box-shadow:0 8px 22px rgba(47,128,237,.08)}
.hd-name{color:var(--ink)}
.hd-name small{color:var(--muted)}
.hd-menu{width:42px;height:42px;display:grid;place-items:center;border:1px solid #E4ECF6;background:#fff;border-radius:12px;color:#334155}
.hd-menu:hover{background:#F8FBFF}
.hd-actions{gap:10px}
.hd-btn{border-radius:14px;border:1px solid #E3ECF7;background:#fff;box-shadow:none}
.hd-line{background:#22C55E;border-color:#22C55E;color:#fff}
.hd-call{background:#0F172A;border-color:#0F172A;color:#fff}
.hd-fav{position:relative;min-width:106px;padding:10px 14px 10px 38px;justify-content:flex-start;color:#334155}
.hd-fav::before{content:"❤";position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;line-height:1;color:#EC5A72}
.hd-fav .fav-label{font-size:.86rem;font-family:'Kanit',sans-serif;font-weight:700}
.hd-fav-count{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#F04461;color:#fff;display:grid;place-items:center;font-size:.7rem;font-weight:700;border:2px solid #fff;box-shadow:0 4px 12px rgba(240,68,97,.22)}
.hero{
  position:relative;
  overflow:hidden;
  margin-top:18px;
  padding:34px 36px 30px;
  min-height:290px;
  border-radius:24px;
  background:linear-gradient(135deg,#FFFFFF 0%,#F3F9FF 58%,#EEF8FF 100%);
  border:1px solid #E2ECF8;
  box-shadow:0 20px 50px rgba(47,128,237,.10);
}
.hero::before{content:"";position:absolute;inset:auto -8% -36% auto;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(47,128,237,.12),transparent 60%);pointer-events:none}
.hero::after{content:"UMHOME CAR";position:absolute;right:22px;bottom:-10px;font-family:'Kanit',sans-serif;font-weight:700;font-size:clamp(3.8rem,10vw,7.8rem);line-height:1;color:rgba(47,128,237,.045);letter-spacing:.03em;white-space:nowrap;pointer-events:none}
.hero h1{color:var(--ink);max-width:780px}
.hero h1 .accent{background:linear-gradient(90deg,#2F80ED,#22C7D6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-stats,.hero p,.hero-trust{color:#5D6B80}
.hero .cnt{background:#fff;border-color:#E2ECF8;color:#344256;box-shadow:none}
.hero-btn,.hero-action.primary{background:linear-gradient(90deg,#2F80ED,#22C7D6)!important;border-color:transparent!important;color:#fff!important;box-shadow:0 12px 26px rgba(47,128,237,.22)!important}
.hero-action{background:#fff!important;border:1px solid #DEE9F6!important;color:#334155!important;box-shadow:none!important}
.hero-action:hover{background:#F7FBFF!important;border-color:#BCD5F3!important}
.hero-action .count{background:#EEF5FF;color:#2F80ED;padding:2px 8px}
.trust-strip{max-width:1180px;margin:0 auto 6px;padding:14px 18px;background:#fff;border:1px solid #E2ECF8;border-top:0;border-radius:0 0 20px 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;box-shadow:var(--shadow)}
.trust-item{background:#F8FBFF;border:1px solid #E7EFF8;border-radius:16px;padding:12px 14px;min-height:58px;color:#334155;font-size:.88rem;font-weight:700}
.trust-icon{width:30px;height:30px;border-radius:10px;color:#fff;font-size:.78rem;box-shadow:0 6px 16px rgba(15,23,42,.08)}
.trust-item:nth-child(1) .trust-icon{background:linear-gradient(135deg,#2F80ED,#60A5FA)}
.trust-item:nth-child(2) .trust-icon{background:linear-gradient(135deg,#22C55E,#34D399)}
.trust-item:nth-child(3) .trust-icon{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.trust-item:nth-child(4) .trust-icon{background:linear-gradient(135deg,#8B5CF6,#A78BFA)}
.tools-card{background:rgba(255,255,255,.9);border:1px solid #E2ECF8;border-radius:18px;padding:12px;box-shadow:var(--shadow)}
.search input,.sort,.adv-toggle,.mini-btn,.adv-field select,.adv-field input,.form-field input,.form-field select,.form-field textarea,.choice-btn,.fin-input,.fin-pct,.fin-term,.detail-action,.cmp-add{border-color:#DCE7F3!important}
.search input,.sort,.adv-toggle,.mini-btn,.adv-field select,.adv-field input,.form-field input,.form-field select,.form-field textarea,.fin-input{background:#fff}
.search input:focus,.adv-field select:focus,.adv-field input:focus,.form-field input:focus,.form-field select:focus,.form-field textarea:focus,.fin-input:focus{border-color:#7DB4F9!important;box-shadow:0 0 0 4px rgba(47,128,237,.10)!important}
.adv-toggle.on,.chips-sub .chip.on,.choice-btn.on,.detail-action.on,.cmp-add.on{background:#EFF6FF!important;border-color:#8BB7F0!important;color:#2F80ED!important}
.result-count,.adv-field label,.form-field label,.form-intro,.fin-note,.stats-note,.card-meta,.sim-meta,.stat-name small{color:var(--muted)}
.card,.rec-card,.sim-card,.cmp-col{background:#fff;border:1px solid #E4EDF8;box-shadow:0 10px 26px rgba(15,23,42,.06)}
.card:hover{transform:translateY(-3px);box-shadow:0 18px 34px rgba(15,23,42,.10)}
.card-img{background:#EAF3FD}
.badges .hot{background:linear-gradient(135deg,#FF9F43,#FF6B6B)!important;color:#fff!important}
.badges .sale{background:#fff!important;color:#EF5B3F!important;border:1px solid #FFE2DA!important}
.fav-btn{background:#fff;border:1px solid #E7EEF8;box-shadow:0 8px 18px rgba(15,23,42,.08)}
.fav-btn.on{background:#FFF5F7;color:#F04461;border-color:#FFD4DF}
.pics{background:rgba(15,23,42,.68)!important}
.card-meta{border-bottom:1px solid #EEF3F8}
.price{color:var(--price)!important}
.card-inst,.rec-reason{color:#64748B}
.card-inst b,.rec-price{color:var(--ink)}

// รถใกล้เคียง: รุ่นเดียวกัน > ยี่ห้อเดียวกัน > ราคาใกล้กัน (±35%)
function similarCars(c, limit) {
  const price = Number(c.price) || 0;
  const norm = (s) => String(s || '').trim().toLowerCase();
  const list = ALL.filter((x) => String(x.id) !== String(c.id)).map((x) => {
    let score = 0;
    const sameModel = x.model && c.model && norm(x.model) === norm(c.model);
    const sameBrand = x.brand && c.brand && norm(x.brand) === norm(c.brand);
    if (sameModel) score += 1000;
    if (sameBrand) score += 200;
    let pdiff = 1;
    if (price && x.price) { pdiff = Math.abs(Number(x.price) - price) / price; score += Math.max(0, 100 - pdiff * 200); }
    return { x, score, sameBrand, pdiff };
  }).filter((o) => o.sameBrand || o.pdiff <= 0.35);
  list.sort((a, b) => b.score - a.score);
  return list.slice(0, limit || 8).map((o) => o.x);
}
function similarHtml(c) {
  const sim = similarCars(c, 8);
  if (!sim.length) return '';
  return '<div class="sim"><div class="sim-hd">🚗 รถใกล้เคียง</div><div class="sim-row">' +
    sim.map((x) => {
      const cover = (x.images && x.images[0]) || x.cover_image_url || '';
      return '<button class="sim-card" data-sim="' + esc(x.id) + '">' +
        (cover ? '<img src="' + esc(cover) + '" alt="" loading="lazy">' : '<div class="sim-noimg">🚗</div>') +
        '<div class="sim-nm">' + esc(carName(x)) + '</div>' +
        '<div class="sim-meta">' + (x.year ? esc(x.year) : '') + (x.mileage ? ' · ' + esc(x.mileage) : '') + '</div>' +
        '<div class="sim-price">' + (baht(x.price) || 'สอบถาม') + '</div></button>';
    }).join('') + '</div></div>';
}

  id = String(id);

  else { if (compareIds.length >= 3) { showToast('เปรียบเทียบได้สูงสุด 3 คัน'); return; } compareIds.push(id); }
  renderCompareBar();
}
function renderCompareBar() {

function runGuide(){
  const income=approxNumber($('#gIncome').value),down=Math.max(0,approxNumber($('#gDown').value)),type=$('#gType').value,people=Number($('#gPeople').value)||5,term=84;
  if(!income){showToast('กรุณากรอกรายได้ต่อเดือน');$('#gIncome').focus();return;}
  const maxMonthly=Math.floor(income*0.5);
  let ranked=ALL.map(c=>{
    const price=Number(c.price)||0,financed=Math.max(0,price-down),monthly=calcMonthly(price,down,term);
    let score=0,reasons=[];
    const underBudget=price>0&&monthly<=maxMonthly;
    if(underBudget){const closeness=maxMonthly?monthly/maxMonthly:0;score+=70+(closeness*30);reasons.push('ค่างวดไม่เกิน 50% ของรายได้');}
    if(type!=='all'){if(c._type===type){score+=55;reasons.push('ตรงกับประเภทรถที่ต้องการ');}else score-=20;}
    if(c._seats>0){if(c._seats>=people){score+=25;reasons.push('รองรับจำนวนผู้โดยสาร');}else score-=35;}
    if(c.is_hot)score+=5;
    return{c,score,monthly,financed,reasons,underBudget};
  }).filter(o=>o.underBudget).sort((a,b)=>b.score-a.score).slice(0,6);
  const box=$('#guideResults');box.hidden=false;
  const summary='<div style="background:#fff7f3;border:1px solid #f3d4c9;border-radius:12px;padding:12px 14px;margin-bottom:12px;line-height:1.55"><b>รายได้ '+baht(income)+'/เดือน</b><br>ผ่อนได้สูงสุดประมาณ <b style="color:var(--brand)">'+baht(maxMonthly)+'/เดือน</b> · คำนวณที่ 84 งวด'+(down?' · ดาวน์ '+baht(down):'')+'</div>';
  if(!ranked.length){
    box.innerHTML=summary+'<h3>ยังไม่พบรถที่อยู่ในกำลังผ่อนโดยประมาณ</h3><p class="fin-note">ลองเพิ่มเงินดาวน์ หรือให้เซลส์ช่วยประเมินรถและเงื่อนไขไฟแนนซ์ที่เหมาะสมอีกครั้ง</p>';
    return;
  }
  box.innerHTML=summary+'<h3>รถที่เหมาะกับคุณ</h3><div class="rec-list">'+ranked.map(o=>{
    const c=o.c,cover=c.cover_image_url||(c.images&&c.images[0])||'',reason=(o.reasons.length?o.reasons:['อยู่ในกำลังผ่อนโดยประมาณ']).slice(0,2).join(' · ');
    return'<button class="rec-card" data-rec="'+esc(c.id)+'">'+(cover?'<img src="'+esc(cover)+'" alt="">':'<div class="rec-noimg">🚗</div>')+'<div class="rec-bd"><div class="rec-name">'+esc(carName(c))+(c.year?' ปี '+esc(c.year):'')+'</div><div class="rec-price">'+(baht(c.price)||'สอบถามราคา')+'</div><div style="font-size:.77rem;color:#4a463f;margin-top:3px;line-height:1.4">ยอดจัดประมาณ '+baht(o.financed)+'<br>84 งวดประมาณ <b>'+baht(o.monthly)+'/เดือน</b></div><div class="rec-reason">✓ '+esc(reason)+'</div></div></button>';
  }).join('')+'</div><div class="fin-note" style="margin-top:12px">ผลคำนวณเป็นการประเมินเบื้องต้น ยังไม่รวมเงื่อนไขด้านภาระหนี้ เครดิตบูโร อายุงาน และหลักเกณฑ์เฉพาะของบริษัทไฟแนนซ์ กรุณาให้เซลส์ตรวจสอบอีกครั้ง</div>';
  box.querySelectorAll('[data-rec]').forEach(b=>b.addEventListener('click',()=>{closeGuide();openCarById(b.dataset.rec);}));
}

  catch(err){showToast('ยังบันทึกไม่ได้ กำลังเปิด LINE ให้แทน');window.open(leadLineUrl(payload),'_blank');btn.disabled=false;btn.textContent='ส่งคำขอนัดดูรถ';}
}
function openLead(c=null){const title=c?carName(c)+(c.year?' ปี '+c.year:''):'ยังไม่ได้เลือกรถ';$('#leadSheet').innerHTML='<div class="form-head"><h2>ให้เซลส์ติดต่อกลับ</h2><button class="sh-x" id="leadX">✕</button></div><div class="form-body"><p class="form-intro">รถที่สนใจ: <b>'+esc(title)+'</b><br>กรอกข้อมูลเพื่อให้ทีมงานช่วยประเมินยอดจัดและค่างวด</p><form id="leadForm"><div class="form-grid"><div class="form-field"><label>ชื่อ *</label><input id="leadName" maxlength="80" required></div><div class="form-field"><label>เบอร์โทร *</label><input id="leadPhone" inputmode="tel" maxlength="20" required></div><div class="form-field"><label>จังหวัด</label><input id="leadProvince" maxlength="80"></div><div class="form-field"><label>เงินดาวน์โดยประมาณ</label><input id="leadDown" inputmode="numeric"></div><div class="form-field"><label>งบผ่อนต่อเดือน</label><input id="leadBudget" inputmode="numeric"></div><div class="form-field"><label>มีรถเทิร์นหรือไม่</label><select id="leadTrade"><option value="no">ไม่มี</option><option value="yes">มีรถเทิร์น</option><option value="unsure">ยังไม่แน่ใจ</option></select></div><div class="form-field full"><label>รายละเอียดเพิ่มเติม</label><textarea id="leadNote" placeholder="เช่น สะดวกรับสายช่วงเวลาใด หรืออาชีพโดยคร่าว"></textarea></div></div><label class="consent"><input type="checkbox" id="leadConsent"> <span>ยินยอมให้ อัมโฮมคาร์ ใช้ข้อมูลนี้เพื่อติดต่อกลับ ให้ข้อมูลรถ และประเมินสินเชื่อเบื้องต้นเท่านั้น *</span></label><button class="form-submit" id="leadSubmit" type="submit">ส่งข้อมูลให้เซลส์</button></form></div>';$('#leadX').addEventListener('click',closeLead);$('#leadForm').addEventListener('submit',e=>submitLead(e,c));$('#leadOv').classList.add('show');document.body.style.overflow='hidden';}
function closeLead(){$('#leadOv').classList.remove('show');document.body.style.overflow=($('#ov').classList.contains('show')||$('#guideOv').classList.contains('show'))?'hidden':'';}
function leadLineUrl(payload){const id=lineOaId(),msg='ขอให้เซลส์ติดต่อกลับครับ/ค่ะ 📞\nชื่อ '+payload.customer_name+'\nโทร '+payload.phone+(payload.province?'\nจังหวัด '+payload.province:'')+(payload.car_name?'\nสนใจ '+payload.car_name:'')+(payload.down_payment?'\nดาวน์ประมาณ '+baht(payload.down_payment):'')+(payload.monthly_budget?'\nงบผ่อน '+baht(payload.monthly_budget)+'/เดือน':'')+'\nรถเทิร์น: '+(payload.has_trade_in==='yes'?'มี':payload.has_trade_in==='unsure'?'ยังไม่แน่ใจ':'ไม่มี')+(payload.note?'\n\n'+payload.note:'');return id&&id[0]==='@'?'https://line.me/R/oaMessage/'+id+'/?'+encodeURIComponent(msg):CONFIG.LINE_URL;}
async function submitLead(e,c){e.preventDefault();const name=$('#leadName').value.trim(),phone=$('#leadPhone').value.trim(),consent=$('#leadConsent').checked;if(!name||phone.replace(/\D/g,'').length<9){showToast('กรุณากรอกชื่อและเบอร์โทรให้ครบ');return;}if(!consent){showToast('กรุณายอมรับการให้ติดต่อกลับ');return;}const payload={car_id:c?String(c.id):null,car_name:c?carName(c)+(c.year?' ปี '+c.year:''):null,customer_name:name,phone,province:$('#leadProvince').value.trim()||null,down_payment:approxNumber($('#leadDown').value)||null,monthly_budget:approxNumber($('#leadBudget').value)||null,has_trade_in:$('#leadTrade').value,note:$('#leadNote').value.trim()||null,consent:true,branch_key:_branchKey||null,source_url:location.href,status:'new'};const btn=$('#leadSubmit');btn.disabled=true;btn.textContent='กำลังส่ง…';try{const{error}=await db.from('showroom_leads').insert(payload);if(error)throw error;$('#leadSheet').innerHTML='<div class="form-head"><h2>ส่งข้อมูลสำเร็จ</h2><button class="sh-x" id="leadX">✕</button></div><div class="form-body"><div class="lead-success"><div class="em">✅</div><h3>ทีมงานได้รับข้อมูลแล้วครับ</h3><p>เซลส์จะติดต่อกลับตามเบอร์ที่แจ้งไว้</p><button class="form-submit" id="leadLine">ทัก LINE เพิ่มเติม</button></div></div>';$('#leadX').addEventListener('click',closeLead);$('#leadLine').addEventListener('click',()=>window.open(leadLineUrl(payload),'_blank'));}catch(err){showToast('ยังบันทึกเข้าระบบไม่ได้ กำลังเปิด LINE ให้แทน');window.open(leadLineUrl(payload),'_blank');btn.disabled=false;btn.textContent='ส่งข้อมูลให้เซลส์';}}
function renderSheet() {
  const c = cur;
  calcDown = 0; calcBudget = 0; calcTerm = (CONFIG.FINANCE && CONFIG.FINANCE.defaultTerm) || 48;
  const imgs = c.images && c.images.length ? c.images : (c.cover_image_url ? [c.cover_image_url] : []);
  const specs = [['ปีรถ', c.year], ['เลขไมล์', c.mileage], ['เครื่องยนต์', c.engine], ['เกียร์', c.gear]].filter((p) => p[1] != null && p[1] !== '');
  $('#sheet').innerHTML =
    '<div class="sh-hero">' +
    (imgs.length ? '<img id="shImg" src="' + esc(imgs[0]) + '" alt="' + esc(carName(c)) + '">' : '<div class="noimg" style="height:100%;display:grid;place-items:center;font-size:3rem;color:#fff">🚗</div>') +
    '<button class="sh-x" id="shX" aria-label="ปิด">✕</button>' +
    '<button class="sh-share" id="shShare" aria-label="แชร์รถคันนี้">🔗</button>' +
    (imgs.length > 1 ? '<button class="sh-nav prev" id="shPrev" aria-label="รูปก่อนหน้า">‹</button><button class="sh-nav next" id="shNext" aria-label="รูปถัดไป">›</button><span class="sh-count" id="shCount">1/' + imgs.length + '</span>' : '') +
    '</div>' +
    (imgs.length > 1 ? '<div class="sh-thumbs">' + imgs.map((u, k) => '<img src="' + esc(u) + '" data-k="' + k + '" class="' + (k === 0 ? 'on' : '') + '" alt="">').join('') + '</div>' : '') +
    '<div class="sh-bd">' + (c.is_hot ? '<span class="sh-hot">🔥 HOT</span>' : '') + '<div class="sh-nm">' + esc(carName(c)) + '</div><div class="sh-price">' + (baht(c.price) || 'สอบถามราคา') + (hasDiscount(c) ? '<s class="old">' + baht(c.original_price) + '</s>' : '') + '</div>' + ownerDetailStatsHtml(c) +
    (specs.length ? '<div class="specs">' + specs.map((p) => '<div class="spec"><span>' + p[0] + '</span><b>' + esc(p[1]) + '</b></div>').join('') + '</div>' : '') +
    (cleanDesc(c.description) ? '<div class="desc">' + esc(cleanDesc(c.description)) + '</div>' : '') +
    financeHtml(c) +
    '<div class="detail-action-row"><button class="detail-action' + (isFavorite(c.id)?' on':'') + '" id="detailFav">' + (isFavorite(c.id)?'♥ บันทึกไว้แล้ว':'♡ บันทึกรถคันนี้') + '</button><button class="detail-action" id="detailGuide">ดูรถใกล้เคียง</button></div>' +
    '<div class="premium-cta-grid"><button class="appointment-cta" id="appointmentBtn">นัดเข้ามาดูรถ</button><button class="cta lead-cta" id="leadBtn">ให้เซลส์ประเมินยอดจัด</button></div>' +
    compareBtnHtml(c) +
    ((c.tiktok_url && /^https?:\/\//i.test(c.tiktok_url)) ? '<a class="cta cta-tiktok" href="' + esc(c.tiktok_url) + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c.32 2.1 1.62 3.55 3.5 3.8v2.35c-1.16.05-2.32-.2-3.36-.78l-.02 5.6c0 2.96-2.2 5.23-5.06 5.23-2.85 0-5.06-2.27-5.06-5.18 0-2.93 2.27-5.2 5.13-5.2.27 0 .54.02.8.06v2.53a2.6 2.6 0 0 0-.86-.15c-1.46 0-2.6 1.18-2.6 2.7 0 1.5 1.14 2.66 2.6 2.66 1.46 0 2.62-1.13 2.62-2.6V3h2.37z"/></svg>🎵 ดูวิดีโอรถคันนี้ใน TikTok</a>' : '') +
    similarHtml(c) +
    '<div class="cta-row"><button class="cta cta-line" data-line><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.64 2 10.1c0 4 3.55 7.34 8.35 7.97.32.07.77.21.88.49.1.25.07.64.03.9l-.14.86c-.04.25-.2 1 .87.54s5.79-3.41 7.9-5.84C21.3 13.5 22 11.88 22 10.1 22 5.64 17.52 2 12 2z"/></svg>สอบถาม LINE</button>' +
    '<button class="cta cta-call" data-call><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.5 21 3 13.5 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1l-2.3 2.2z"/></svg>โทรเลย</button></div></div>';
  $('#shX').addEventListener('click', closeDetail);
  $('#shShare').addEventListener('click', () => shareCar(cur));
  wireFinance();
  const detailFav=$('#detailFav'); if(detailFav)detailFav.addEventListener('click',()=>toggleFavorite(cur.id));
  const detailGuide=$('#detailGuide'); if(detailGuide)detailGuide.addEventListener('click',()=>{closeDetail();openGuide({type:cur._type,seats:cur._seats});});
  const appointmentBtn=$('#appointmentBtn'); if(appointmentBtn)appointmentBtn.addEventListener('click',()=>openAppointment(cur));
  const leadBtn=$('#leadBtn'); if(leadBtn)leadBtn.addEventListener('click',()=>openLead(cur));
  const cmpAdd = $('#cmpAdd');
  if (cmpAdd) cmpAdd.addEventListener('click', () => {
    const wasIn = inCompare(cur.id);
    toggleCompare(cur.id);
    const on = inCompare(cur.id);
    cmpAdd.classList.toggle('on', on);
    cmpAdd.textContent = on ? '✓ อยู่ในรายการเปรียบเทียบ' : '⚖️ เพิ่มไปเปรียบเทียบ';
    // เพิ่งเพิ่มคัน แล้วมีครบ 2 คันขึ้นไป → เด้งหน้าเปรียบเทียบเลย (ไม่ต้องปิดหน้ารถ)
    if (!wasIn && on && compareIds.length >= 2) openCompare();
  });
  $('#sheet').querySelectorAll('[data-sim]').forEach((b) => b.addEventListener('click', () => openCarById(b.dataset.sim)));
  const D = imgs.length;
  if (D > 1) {
    $('#shPrev').addEventListener('click', () => { curIdx = (curIdx - 1 + D) % D; gallery(D); });
    $('#shNext').addEventListener('click', () => { curIdx = (curIdx + 1) % D; gallery(D); });
    $('#sheet').querySelectorAll('.sh-thumbs img').forEach((t) => t.addEventListener('click', () => { curIdx = Number(t.dataset.k); gallery(D); }));
  }
  $('#sheet').querySelectorAll('[data-line]').forEach((b) => b.addEventListener('click', () => window.open(lineCarUrl(cur), '_blank')));
  $('#sheet').querySelectorAll('[data-call]').forEach((b) => b.addEventListener('click', () => { location.href = 'tel:' + CONFIG.PHONE.replace(/[^0-9+]/g, ''); }));
}
$('#ov').addEventListener('click', (e) => { if (e.target.id === 'ov') closeDetail(); });
$('#statsOv').addEventListener('click', (e) => { if (e.target.id === 'statsOv') closeStats(); });
$('#statsBtn').addEventListener('click', openStats);
$('#cmpOpen').addEventListener('click', openCompare);
$('#cmpClear').addEventListener('click', clearCompare);
$('#cmpOv').addEventListener('click', (e) => { if (e.target.id === 'cmpOv') closeCompare(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('#guideOv').classList.contains('show')) { closeGuide(); return; }
  if (e.key === 'Escape' && $('#leadOv').classList.contains('show')) { closeLead(); return; }
  if (!$('#ov').classList.contains('show')) return;
  if (e.key === 'Escape') closeDetail();
  if (cur && cur.images && cur.images.length > 1) {
    const D = cur.images.length;
    if (e.key === 'ArrowLeft') { curIdx = (curIdx - 1 + D) % D; gallery(D); }
    if (e.key === 'ArrowRight') { curIdx = (curIdx + 1) % D; gallery(D); }
  }
});
$('#menuBtn').addEventListener('click', openDrawer);
$('#drawerX').addEventListener('click', closeDrawer);
$('#drawerOv').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('#drawer').classList.contains('show')) closeDrawer(); });

$('#q').addEventListener('input', (e) => { clearTimeout(qt); const v = e.target.value; qt = setTimeout(() => { query = v.trim(); apply(); }, 200); });

Object.entries(advMap).forEach(([id,key])=>$('#'+id).addEventListener('change',e=>{filters[key]=e.target.value;apply();}));
